<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatLens — AI-анализатор угроз</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Consolas, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .nav { display: flex; align-items: center; padding: 12px 24px; background: #111; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
        .nav-brand { font-size: 1.3em; font-weight: bold; cursor: pointer; margin-right: 20px; }
        .nav-brand span { color: #00d4ff; }
        .nav-links { display: flex; gap: 4px; }
        .nav-link { color: #888; text-decoration: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 0.9em; }
        .nav-link:hover { color: #e0e0e0; background: #1a1a1a; }
        .nav-link.active { color: #00d4ff; background: #0a1520; }
        .page { display: none; }
        .page.active { display: block; }
        .page-title { color: #00d4ff; margin-bottom: 20px; font-size: 1.3em; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .upload-zone { border: 2px dashed #333; border-radius: 12px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: #111; margin-bottom: 20px; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #00d4ff; background: #0a1520; }
        .upload-zone p { color: #888; font-size: 1.1em; }
        .upload-zone .icon { font-size: 3em; margin-bottom: 10px; }
        .options { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; justify-content: center; }
        .options label { color: #888; cursor: pointer; }
        .options input[type=checkbox] { accent-color: #00d4ff; }
        .btn { background: #00d4ff; color: #000; border: none; padding: 10px 24px; border-radius: 8px; font-size: 0.95em; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #00b8e6; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #result { display: none; margin-top: 30px; }
        .risk-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 1.1em; margin: 12px 0; }
        .risk-LOW { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
        .risk-MEDIUM { background: #3a3a1a; color: #ff9800; border: 1px solid #ff9800; }
        .risk-HIGH { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        .risk-CRITICAL { background: #4a0a0a; color: #ff1744; border: 1px solid #ff1744; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.7} }
        .info-table { width: 100%; margin: 15px 0; }
        .info-table td { padding: 6px 12px; border-bottom: 1px solid #1a1a1a; }
        .info-table td:first-child { color: #888; width: 120px; }
        .info-table .hash { font-family: monospace; font-size: 0.85em; color: #aaa; word-break: break-all; }
        .findings { list-style: none; margin: 15px 0; }
        .findings li { padding: 8px 12px; margin: 4px 0; border-radius: 6px; background: #1a1a1a; border-left: 3px solid #333; font-size: 0.9em; }
        .findings li.critical { border-left-color: #ff1744; }
        .findings li.high { border-left-color: #f44336; }
        .findings li.medium { border-left-color: #ff9800; }
        .ai-box { background: #0a1520; border: 1px solid #00d4ff33; border-radius: 8px; padding: 20px; margin: 15px 0; white-space: pre-wrap; line-height: 1.6; }
        .ai-box h3 { color: #00d4ff; margin-bottom: 10px; }
        .recommendations { margin: 15px 0; }
        .recommendations li { padding: 5px 0; color: #ccc; }
        .section-title { color: #00d4ff; font-size: 1.05em; margin: 20px 0 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .score-bar { width: 100%; height: 8px; background: #1a1a1a; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .score-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
        .loading { display: none; text-align: center; padding: 40px; color: #888; }
        .loading.active { display: block; }
        .loading-text { color: #666; text-align: center; padding: 30px; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: #111; border-radius: 8px; border-left: 3px solid #333; cursor: pointer; transition: background 0.2s; }
        .history-item:hover { background: #1a1a1a; }
        .history-item.risk-CRITICAL { border-left-color: #ff1744; }
        .history-item.risk-HIGH { border-left-color: #f44336; }
        .history-item.risk-MEDIUM { border-left-color: #ff9800; }
        .history-item.risk-LOW { border-left-color: #4caf50; }
        .history-file { font-weight: bold; font-size: 0.95em; overflow: hidden; text-overflow: ellipsis; }
        .history-meta { color: #666; font-size: 0.8em; }
        .history-badge { font-size: 0.8em; font-weight: bold; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
        .history-empty { text-align: center; color: #555; padding: 40px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 10px 16px; border-radius: 8px; font-family: monospace; font-size: 0.95em; }
        .search-box input:focus { border-color: #00d4ff; outline: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #111; border-radius: 10px; padding: 20px; text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; font-size: 0.85em; margin-top: 4px; }
        .risk-bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
        .risk-bar-label { width: 110px; text-align: right; font-size: 0.85em; }
        .risk-bar-track { flex: 1; height: 20px; background: #1a1a1a; border-radius: 4px; overflow: hidden; }
        .risk-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .risk-bar-count { width: 40px; font-size: 0.85em; color: #888; }
        footer { text-align: center; color: #444; margin-top: 40px; padding: 20px; font-size: 0.85em; }
        footer a { color: #00d4ff; text-decoration: none; }
        @media (max-width: 600px) {
            .nav { padding: 10px 12px; }
            .nav-link { padding: 6px 10px; font-size: 0.8em; }
            .history-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-brand" onclick="showPage('scan')"><span>Threat</span>Lens</div>
    <div class="nav-links">
        <a class="nav-link active" data-page="scan" onclick="showPage('scan')">Сканировать</a>
        <a class="nav-link" data-page="history" onclick="showPage('history')">История</a>
        <a class="nav-link" data-page="lookup" onclick="showPage('lookup')">Поиск по хешу</a>
        <a class="nav-link" data-page="stats" onclick="showPage('stats')">Статистика</a>
    </div>
</nav>

<div class="container">
    <div id="page-scan" class="page active">
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="icon">&#128270;</div>
            <p>Перетащите файл сюда или нажмите для загрузки</p>
            <p style="font-size: 0.8em; margin-top: 8px; color: #555;">Поддерживает: .exe .dll .py .js .ps1 .bat .zip .docx и другие</p>
        </div>
        <input type="file" id="fileInput" style="display:none">
        <div class="options">
            <label><input type="checkbox" id="useAI"> AI-объяснение (YandexGPT)</label>
            <button class="btn" id="scanBtn" disabled onclick="scanFile()">Сканировать</button>
        </div>
        <div class="loading" id="loading"><div class="spinner"></div><p style="margin-top:15px">Анализ файла...</p></div>
        <div id="result"></div>
    </div>

    <div id="page-history" class="page">
        <h2 class="page-title">История сканирований</h2>
        <div id="historyList"><p class="loading-text">Загрузка...</p></div>
    </div>

    <div id="page-lookup" class="page">
        <h2 class="page-title">Поиск по SHA256</h2>
        <div class="search-box">
            <input type="text" id="lookupInput" placeholder="Введите SHA256 хеш (полный или начало)" maxlength="64">
            <button class="btn" onclick="lookupHash()">Найти</button>
        </div>
        <div id="lookupResult"></div>
    </div>

    <div id="page-stats" class="page">
        <h2 class="page-title">Статистика</h2>
        <div id="statsContent"><p class="loading-text">Загрузка...</p></div>
    </div>
</div>

<footer>ThreatLens &copy; 2026 | <a href="https://github.com/MaximkaVLG/threatlens">GitHub</a></footer>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function showPage(name){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    document.querySelector('[data-page="'+name+'"]').classList.add('active');
    if(name==='history')loadHistory();
    if(name==='stats')loadStats();
}

let selectedFile=null;
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const scanBtn=document.getElementById('scanBtn');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length){selectedFile=e.dataTransfer.files[0];updateUploadUI()}});
fileInput.addEventListener('change',()=>{selectedFile=fileInput.files[0];updateUploadUI()});
function updateUploadUI(){if(selectedFile){dropZone.innerHTML='<div class="icon">&#128196;</div><p>'+esc(selectedFile.name)+' ('+(selectedFile.size/1024).toFixed(1)+' КБ)</p>';scanBtn.disabled=false}}

const RL={LOW:'НИЗКИЙ',MEDIUM:'СРЕДНИЙ',HIGH:'ВЫСОКИЙ',CRITICAL:'КРИТИЧЕСКИЙ'};
const SRU={'This file is almost certainly malicious.':'Этот файл почти наверняка вредоносный.','This file shows strong indicators of malicious behavior.':'Файл демонстрирует явные признаки вредоносного поведения.','This file contains suspicious elements that warrant caution.':'Файл содержит подозрительные элементы, требующие осторожности.','This file appears to be low risk, but always exercise caution.':'Файл выглядит безопасным, но всегда соблюдайте осторожность.'};
const RRU={'DELETE this file immediately':'УДАЛИТЕ этот файл немедленно','Do NOT execute it under any circumstances':'НЕ запускайте его ни при каких обстоятельствах','If already executed: change all passwords, run full antivirus scan':'Если уже запускали: смените все пароли, запустите полную проверку антивирусом','Check for unauthorized processes in Task Manager':'Проверьте диспетчер задач на подозрительные процессы','Do not execute this file':'Не запускайте этот файл','Consider deleting it':'Рекомендуется удалить','If you must use it, run in a virtual machine only':'Только в виртуальной машине','Proceed with caution':'Действуйте с осторожностью','Verify the source of this file':'Проверьте источник файла','Consider running in a sandbox before execution':'Проверьте в песочнице','File appears safe based on static analysis':'Файл выглядит безопасным','Dynamic behavior may differ — use caution with unknown sources':'Поведение при запуске может отличаться'};
function tr(t,d){return d[t]||t}

async function scanFile(){
    if(!selectedFile)return;
    document.getElementById('loading').classList.add('active');
    document.getElementById('result').style.display='none';
    scanBtn.disabled=true;
    const fd=new FormData();fd.append('file',selectedFile);fd.append('ai',document.getElementById('useAI').checked);
    try{
        const r=await fetch('/api/scan',{method:'POST',body:fd});
        if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||'Ошибка')}
        renderResult(await r.json());
    }catch(e){document.getElementById('result').innerHTML='<p style="color:#f44336;text-align:center;padding:20px">'+esc(e.message)+'</p>';document.getElementById('result').style.display='block'}
    document.getElementById('loading').classList.remove('active');scanBtn.disabled=false;
}

function renderResult(d){
    const c=d.risk_level==='CRITICAL'?'#ff1744':d.risk_level==='HIGH'?'#f44336':d.risk_level==='MEDIUM'?'#ff9800':'#4caf50';
    let h='<div class="section-title">Информация о файле</div><table class="info-table">';
    h+='<tr><td>Файл</td><td>'+esc(d.file)+'</td></tr>';
    h+='<tr><td>Размер</td><td>'+d.size.toLocaleString()+' байт</td></tr>';
    h+='<tr><td>Тип</td><td>'+esc(d.type)+'</td></tr>';
    h+='<tr><td>MD5</td><td class="hash">'+esc(d.md5)+'</td></tr>';
    h+='<tr><td>SHA256</td><td class="hash">'+esc(d.sha256)+'</td></tr>';
    h+='<tr><td>Энтропия</td><td>'+d.entropy+' ('+esc(d.entropy_verdict)+')</td></tr></table>';
    h+='<div style="text-align:center"><div class="risk-badge risk-'+d.risk_level+'">'+(RL[d.risk_level]||d.risk_level)+' ('+d.risk_score+'/100)</div>';
    h+='<div class="score-bar"><div class="score-fill" style="width:'+d.risk_score+'%;background:'+c+'"></div></div>';
    h+='<p>'+esc(tr(d.summary,SRU))+'</p></div>';
    if(d.explanation){h+='<div class="ai-box"><h3>Объяснение</h3>'+esc(d.explanation)+'</div>'}
    if(d.findings&&d.findings.length){
        h+='<div class="section-title">Находки ('+d.findings.length+')</div><ul class="findings">';
        d.findings.forEach(f=>{let cl='';const fl=f.toLowerCase();if(fl.includes('heuristic')||fl.includes('injection')||fl.includes('keylog')||fl.includes('password'))cl='critical';else if(fl.includes('network')||fl.includes('persistence'))cl='high';else if(fl.includes('obfuscation'))cl='medium';h+='<li class="'+cl+'">'+esc(f)+'</li>'});
        h+='</ul>';
    }
    if(d.ai_explanation){h+='<div class="ai-box"><h3>AI-анализ (YandexGPT)</h3>'+esc(d.ai_explanation)+'</div>'}
    if(d.recommendations&&d.recommendations.length){
        h+='<div class="section-title">Рекомендации</div><ul class="recommendations">';
        d.recommendations.forEach(r=>h+='<li>&gt; '+esc(tr(r,RRU))+'</li>');h+='</ul>';
    }
    document.getElementById('result').innerHTML=h;document.getElementById('result').style.display='block';
}

async function loadHistory(){
    const el=document.getElementById('historyList');el.innerHTML='<p class="loading-text">Загрузка...</p>';
    try{
        const r=await fetch('/api/history?limit=50');const data=await r.json();
        if(!data||!data.length){el.innerHTML='<div class="history-empty">Пока нет сканирований</div>';return}
        let h='';data.forEach(i=>{
            const rc=i.risk_level==='CRITICAL'?'#ff1744':i.risk_level==='HIGH'?'#f44336':i.risk_level==='MEDIUM'?'#ff9800':'#4caf50';
            const sz=i.file_size?(i.file_size/1024).toFixed(1)+' КБ':'';
            const thr=i.heuristic_type?' — '+i.heuristic_type.toUpperCase():'';
            h+='<div class="history-item risk-'+i.risk_level+'" onclick="lookupFromHistory(\''+i.sha256+'\')">';
            h+='<div><div class="history-file">'+esc(i.file_name||'unknown')+'</div>';
            h+='<div class="history-meta">'+esc(i.sha256.substring(0,16))+'... &middot; '+sz+thr+'</div></div>';
            h+='<div class="history-badge" style="color:'+rc+';border:1px solid '+rc+'">'+(RL[i.risk_level]||i.risk_level)+' '+i.risk_score+'</div></div>';
        });el.innerHTML=h;
    }catch(e){el.innerHTML='<p style="color:#f44336">'+esc(e.message)+'</p>'}
}
function lookupFromHistory(sha){document.getElementById('lookupInput').value=sha;showPage('lookup');lookupHash()}

async function lookupHash(){
    const hash=document.getElementById('lookupInput').value.trim();const el=document.getElementById('lookupResult');
    if(!hash){el.innerHTML='';return}
    if(!/^[0-9a-fA-F]+$/.test(hash)){el.innerHTML='<p style="color:#f44336">Неверный формат хеша</p>';return}
    el.innerHTML='<p class="loading-text">Поиск...</p>';
    try{
        const r=await fetch('/api/lookup/'+hash);
        if(r.status===404){el.innerHTML='<p style="color:#888;text-align:center;padding:20px">Хеш не найден. Сначала сканируйте файл.</p>';return}
        const data=await r.json();
        if(data.matches){
            let h='<div class="section-title">Найдено '+data.matches.length+' совпадений</div>';
            data.matches.forEach(m=>{h+='<div class="history-item risk-'+m.risk_level+'" onclick="lookupFromHistory(\''+m.sha256+'\')"><div class="history-file">'+esc(m.file_name)+'</div><div class="history-badge">'+(RL[m.risk_level]||m.risk_level)+' '+m.risk_score+'</div></div>'});
            el.innerHTML=h;
        }else{renderResult(data);el.innerHTML=document.getElementById('result').innerHTML;document.getElementById('result').style.display='none'}
    }catch(e){el.innerHTML='<p style="color:#f44336">'+esc(e.message)+'</p>'}
}
document.getElementById('lookupInput').addEventListener('keydown',e=>{if(e.key==='Enter')lookupHash()});

async function loadStats(){
    const el=document.getElementById('statsContent');el.innerHTML='<p class="loading-text">Загрузка...</p>';
    try{
        const r=await fetch('/api/stats');const d=await r.json();
        const t=d.total_files||0,s=d.total_scans||0,hi=d.cache_hits||0,lv=d.by_risk_level||{};
        let h='<div class="stats-grid">';
        h+='<div class="stat-card"><div class="stat-number">'+t+'</div><div class="stat-label">Уникальных файлов</div></div>';
        h+='<div class="stat-card"><div class="stat-number">'+s+'</div><div class="stat-label">Всего сканирований</div></div>';
        h+='<div class="stat-card"><div class="stat-number">'+hi+'</div><div class="stat-label">Из кеша</div></div></div>';
        if(Object.keys(lv).length){
            const mx=Math.max(...Object.values(lv),1);
            const cl={LOW:'#4caf50',MEDIUM:'#ff9800',HIGH:'#f44336',CRITICAL:'#ff1744'};
            h+='<div class="section-title">По уровню риска</div>';
            ['CRITICAL','HIGH','MEDIUM','LOW'].forEach(l=>{
                const n=lv[l]||0,p=(n/mx*100).toFixed(0);
                h+='<div class="risk-bar-row"><div class="risk-bar-label" style="color:'+(cl[l]||'#888')+'">'+(RL[l]||l)+'</div>';
                h+='<div class="risk-bar-track"><div class="risk-bar-fill" style="width:'+p+'%;background:'+(cl[l]||'#888')+'"></div></div>';
                h+='<div class="risk-bar-count">'+n+'</div></div>';
            });
        }
        el.innerHTML=h;
    }catch(e){el.innerHTML='<p style="color:#f44336">'+esc(e.message)+'</p>'}
}
</script>
</body>
</html>
