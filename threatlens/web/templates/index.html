<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatLens — AI-анализатор угроз</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1><span>Threat</span>Lens</h1>
    <p class="subtitle">AI-анализатор файловых угроз</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">&#128270;</div>
        <p>Перетащите файл сюда или нажмите для загрузки</p>
        <p style="font-size: 0.8em; margin-top: 8px; color: #555;">Поддерживает: .exe .dll .py .js .ps1 .bat .zip .docx и другие</p>
    </div>
    <input type="file" id="fileInput" style="display:none">

    <div class="options">
        <label><input type="checkbox" id="useAI"> AI-объяснение (YandexGPT)</label>
        <button class="btn" id="scanBtn" disabled onclick="scanFile()">Сканировать</button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Анализ файла...</p>
    </div>

    <div id="result"></div>
</div>

<footer>ThreatLens &copy; 2026 | github.com/MaximkaVLG/threatlens</footer>

<script src="/static/app.js"></script>
</body>
</html>
