<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatLens — AI-анализатор угроз</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Consolas, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

        h1 { text-align: center; font-size: 2em; margin-bottom: 8px; }
        h1 span { color: #00d4ff; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; }

        .upload-zone {
            border: 2px dashed #333; border-radius: 12px; padding: 60px 20px;
            text-align: center; cursor: pointer; transition: all 0.3s;
            background: #111; margin-bottom: 20px;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #00d4ff; background: #0a1520; }
        .upload-zone p { color: #888; font-size: 1.1em; }
        .upload-zone .icon { font-size: 3em; margin-bottom: 10px; }

        .options { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; justify-content: center; }
        .options label { color: #888; cursor: pointer; }
        .options input[type=checkbox] { accent-color: #00d4ff; }

        .btn { background: #00d4ff; color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #00b8e6; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #result { display: none; margin-top: 30px; }

        .risk-badge {
            display: inline-block; padding: 8px 20px; border-radius: 20px;
            font-weight: bold; font-size: 1.2em; margin: 15px 0;
        }
        .risk-LOW { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
        .risk-MEDIUM { background: #3a3a1a; color: #ff9800; border: 1px solid #ff9800; }
        .risk-HIGH { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        .risk-CRITICAL { background: #4a0a0a; color: #ff1744; border: 1px solid #ff1744; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .info-table { width: 100%; margin: 15px 0; }
        .info-table td { padding: 6px 12px; border-bottom: 1px solid #1a1a1a; }
        .info-table td:first-child { color: #888; width: 120px; }
        .info-table .hash { font-family: monospace; font-size: 0.85em; color: #aaa; word-break: break-all; }

        .findings { list-style: none; margin: 15px 0; }
        .findings li { padding: 8px 12px; margin: 4px 0; border-radius: 6px; background: #1a1a1a; border-left: 3px solid #333; }
        .findings li.critical { border-left-color: #ff1744; }
        .findings li.high { border-left-color: #f44336; }
        .findings li.medium { border-left-color: #ff9800; }

        .ai-box { background: #0a1520; border: 1px solid #00d4ff33; border-radius: 8px; padding: 20px; margin: 15px 0; white-space: pre-wrap; line-height: 1.6; }
        .ai-box h3 { color: #00d4ff; margin-bottom: 10px; }

        .recommendations { margin: 15px 0; }
        .recommendations li { padding: 5px 0; color: #ccc; }

        .section-title { color: #00d4ff; font-size: 1.1em; margin: 20px 0 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }

        .score-bar { width: 100%; height: 8px; background: #1a1a1a; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .score-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

        .loading { display: none; text-align: center; padding: 40px; color: #888; }
        .loading.active { display: block; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { text-align: center; color: #444; margin-top: 40px; font-size: 0.85em; }
    </style>
</head>
<body>
<div class="container">
    <h1><span>Threat</span>Lens</h1>
    <p class="subtitle">AI-анализатор файловых угроз</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">&#128270;</div>
        <p>Перетащите файл сюда или нажмите для загрузки</p>
        <p style="font-size: 0.8em; margin-top: 8px; color: #555;">Поддерживает: .exe .dll .py .js .ps1 .bat .zip .docx и другие</p>
    </div>
    <input type="file" id="fileInput" style="display:none">

    <div class="options">
        <label><input type="checkbox" id="useAI"> AI-объяснение (YandexGPT)</label>
        <button class="btn" id="scanBtn" disabled onclick="scanFile()">Сканировать</button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Анализ файла...</p>
    </div>

    <div id="result"></div>
</div>

<footer>ThreatLens &copy; 2026 | github.com/MaximkaVLG/threatlens</footer>

<script>
let selectedFile = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const scanBtn = document.getElementById('scanBtn');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) { selectedFile = e.dataTransfer.files[0]; updateUI(); }
});
fileInput.addEventListener('change', () => { selectedFile = fileInput.files[0]; updateUI(); });

function updateUI() {
    if (selectedFile) {
        dropZone.innerHTML = '<div class="icon">&#128196;</div><p>' + selectedFile.name + ' (' + (selectedFile.size / 1024).toFixed(1) + ' КБ)</p>';
        scanBtn.disabled = false;
    }
}

const RISK_LABELS = { LOW: 'НИЗКИЙ', MEDIUM: 'СРЕДНИЙ', HIGH: 'ВЫСОКИЙ', CRITICAL: 'КРИТИЧЕСКИЙ' };
const SUMMARY_RU = {
    'This file is almost certainly malicious.': 'Этот файл почти наверняка вредоносный.',
    'This file shows strong indicators of malicious behavior.': 'Файл демонстрирует явные признаки вредоносного поведения.',
    'This file contains suspicious elements that warrant caution.': 'Файл содержит подозрительные элементы, требующие осторожности.',
    'This file appears to be low risk, but always exercise caution.': 'Файл выглядит безопасным, но всегда соблюдайте осторожность.',
};
const REC_RU = {
    'DELETE this file immediately': 'УДАЛИТЕ этот файл немедленно',
    'Do NOT execute it under any circumstances': 'НЕ запускайте его ни при каких обстоятельствах',
    'If already executed: change all passwords, run full antivirus scan': 'Если уже запускали: смените все пароли, запустите полную проверку антивирусом',
    'Check for unauthorized processes in Task Manager': 'Проверьте диспетчер задач на наличие подозрительных процессов',
    'Do not execute this file': 'Не запускайте этот файл',
    'Consider deleting it': 'Рекомендуется удалить',
    'If you must use it, run in a virtual machine only': 'Если необходимо использовать — только в виртуальной машине',
    'Proceed with caution': 'Действуйте с осторожностью',
    'Verify the source of this file': 'Проверьте источник файла',
    'Consider running in a sandbox before execution': 'Перед запуском рекомендуется проверить в песочнице',
    'File appears safe based on static analysis': 'По результатам статического анализа файл выглядит безопасным',
    'Dynamic behavior may differ — use caution with unknown sources': 'Поведение при запуске может отличаться — будьте осторожны с файлами из неизвестных источников',
};

function tr(text, dict) { return dict[text] || text; }

async function scanFile() {
    if (!selectedFile) return;

    document.getElementById('loading').classList.add('active');
    document.getElementById('result').style.display = 'none';
    scanBtn.disabled = true;

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('ai', document.getElementById('useAI').checked);

    try {
        const resp = await fetch('/api/scan', { method: 'POST', body: formData });
        const data = await resp.json();
        renderResult(data);
    } catch (err) {
        document.getElementById('result').innerHTML = '<p style="color:red;">Ошибка: ' + err.message + '</p>';
        document.getElementById('result').style.display = 'block';
    }

    document.getElementById('loading').classList.remove('active');
    scanBtn.disabled = false;
}

function renderResult(data) {
    const scoreColor = data.risk_level === 'CRITICAL' ? '#ff1744' : data.risk_level === 'HIGH' ? '#f44336' : data.risk_level === 'MEDIUM' ? '#ff9800' : '#4caf50';
    const riskLabel = RISK_LABELS[data.risk_level] || data.risk_level;

    let html = '<div class="section-title">Информация о файле</div>';
    html += '<table class="info-table">';
    html += '<tr><td>Файл</td><td>' + data.file + '</td></tr>';
    html += '<tr><td>Размер</td><td>' + data.size.toLocaleString() + ' байт</td></tr>';
    html += '<tr><td>Тип</td><td>' + data.type + '</td></tr>';
    html += '<tr><td>MD5</td><td class="hash">' + data.md5 + '</td></tr>';
    html += '<tr><td>SHA256</td><td class="hash">' + data.sha256 + '</td></tr>';
    html += '<tr><td>Энтропия</td><td>' + data.entropy + ' (' + data.entropy_verdict + ')</td></tr>';
    html += '</table>';

    html += '<div style="text-align:center">';
    html += '<div class="risk-badge risk-' + data.risk_level + '">' + riskLabel + ' (' + data.risk_score + '/100)</div>';
    html += '<div class="score-bar"><div class="score-fill" style="width:' + data.risk_score + '%;background:' + scoreColor + '"></div></div>';
    html += '<p>' + tr(data.summary, SUMMARY_RU) + '</p></div>';

    if (data.findings && data.findings.length > 0) {
        html += '<div class="section-title">Находки (' + data.findings.length + ')</div>';
        html += '<ul class="findings">';
        data.findings.forEach(f => {
            let cls = '';
            if (f.toLowerCase().includes('injection') || f.toLowerCase().includes('keylog') || f.toLowerCase().includes('password')) cls = 'critical';
            else if (f.toLowerCase().includes('network') || f.toLowerCase().includes('persistence')) cls = 'high';
            else if (f.toLowerCase().includes('obfuscation')) cls = 'medium';
            html += '<li class="' + cls + '">' + f + '</li>';
        });
        html += '</ul>';
    }

    if (data.ai_explanation) {
        html += '<div class="ai-box"><h3>AI-анализ (YandexGPT)</h3>' + data.ai_explanation + '</div>';
    }

    if (data.recommendations && data.recommendations.length > 0) {
        html += '<div class="section-title">Рекомендации</div>';
        html += '<ul class="recommendations">';
        data.recommendations.forEach(r => html += '<li>&gt; ' + tr(r, REC_RU) + '</li>');
        html += '</ul>';
    }

    document.getElementById('result').innerHTML = html;
    document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
