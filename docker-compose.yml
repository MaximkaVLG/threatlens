services:
  threatlens:
    build: .
    ports:
      - "8888:8888"
    environment:
      - YANDEX_OAUTH_TOKEN=${YANDEX_OAUTH_TOKEN:-}
      - YANDEX_CLOUD_FOLDER_ID=${YANDEX_CLOUD_FOLDER_ID:-}
    volumes:
      # Mount scan directory for CLI usage
      - ./scans:/scans
    restart: unless-stopped
    # Security: limit resources
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    # Security: read-only filesystem where possible
    read_only: true
    tmpfs:
      - /tmp:size=500M
