services:
  threatlens:
    build: .
    ports:
      - "8888:8888"
    environment:
      - AI_PROVIDER=ollama
      - OLLAMA_URL=http://ollama:11434
    volumes:
      # Mount scan directory for CLI usage
      - ./scans:/scans
    restart: unless-stopped
    # Security: limit resources
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    # Security: read-only filesystem where possible
    read_only: true
    tmpfs:
      - /tmp:size=500M

  # Optional: local AI for explanations
  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]  # Only starts with: docker-compose --profile ai up
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G

volumes:
  ollama_data:
